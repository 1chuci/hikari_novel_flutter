name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'     # 与你本地完全一致（2026年4月最新稳定版）
          channel: 'stable'
          cache: true                   # 缓存 Flutter SDK 和 pub 依赖，大幅加速构建

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests (可选)
        run: flutter test

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikari-novel-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30          # 保留30天下载链接
