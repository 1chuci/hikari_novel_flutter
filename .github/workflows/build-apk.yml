name: Build APK (Personal Use)

on:
  workflow_dispatch:     # 改成手动触发（推荐），避免每次 push 都跑
    # push:
    #   branches: [ main ]
    # pull_request:
    #   branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (允许 warning 和 info，不中断构建)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true     # 关键：即使有问题也继续往下执行

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hikari-novel-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
